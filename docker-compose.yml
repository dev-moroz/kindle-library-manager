services:
  php:
    image: php:8.2-fpm
    container_name: library-manager-php
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./:/var/www/html:rw  # read write

  nginx:
    image: nginx:alpine
    container_name: library-manager-nginx
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./:/var/www/html:ro  # Nginx read only
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php